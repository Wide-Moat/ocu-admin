; Vale configuration: prose linting for the operator-console docs.
; The whole Architecture style set is vendored byte-identical from the fleet
; canon (Wide-Moat/open-computer-use, .vale/styles/Architecture) — one banlist
; across all repos. Add files only by re-vendoring the canon set in full; do not
; name a fixed subset here, or the comment drifts as canon grows a new rule.
;
; Reference: https://vale.sh/docs/keys

StylesPath = .vale/styles

MinAlertLevel = warning

[*.md]
BasedOnStyles = Architecture

; Skip YAML front-matter, inline code spans, fenced code blocks, and HTML
; comments (SPDX headers). Rules apply to prose only.
TokenIgnores = (?s)---\n.*?\n---, (?s)`[^`]+`
BlockIgnores = (?s)^```.*?\n```, (?s)<!--.*?-->
