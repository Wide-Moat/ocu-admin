# gitleaks config for the ocu-admin repository (read-only operator console).
#
# [extend] useDefault is load-bearing: CI passes this file via --config, and a
# --config WITHOUT it REPLACES the default ruleset with nothing — the scanner
# runs with zero rules and stays green forever. Verified two-sided against
# gitleaks 8.30.1 (the CI-pinned version): a planted token is caught with this
# block and silently missed without it.
#
# Allowlist policy (mirrors the .trivyignore 14-day class in spirit): an entry
# must be a documented false positive, scoped as tightly as possible (exact
# value or exact path), with a one-line reason. This repo currently needs
# none: the operator credential and session secret live in OCU_ADMIN_* env,
# never in the tree.

[extend]
useDefault = true
