# lychee — broken link checker.
# Reference: https://lychee.cli.rs/usage/config/
#
# Inputs (which files/dirs to scan) are passed as positional CLI args by the
# workflow, not as a config-file key. This file only carries flags and
# exclusions.

# Skip these paths when expanding globs — common noisy directories and the
# local-only planning tree.
exclude_path = [
  "node_modules",
  ".venv",
  ".planning",
]

# (Anchor-fragment checking is intentionally omitted: its config key differs
# between lychee versions — a bool in <=0.23, an enum in >=0.24 — and pinning the
# newer binary breaks the action's installer. The forward-reference rule we care
# about is "a relative link to a missing file is broken", which needs no flag.)

# Patterns to allow without HTTP checking (anchor-only refs, mailto, etc.).
exclude = [
  '^mailto:',
  '^tel:',
]

# External URLs are not what we're guarding against (forward-reference rule).
# Skip them to avoid CI failing on rate-limited or transiently-down upstreams.
exclude_all_private = false
offline = false

no_progress = true
verbose = "info"
