#
# Phase-1 blocking CI for the read-only operator console. Every gate that runs
# locally (CONSTITUTION "Verification discipline") is made BLOCKING on PR here —
# a working gate that nothing enforces is the same fake-guard class this repo
# already had to remove. Mirrors the fleet canon (Wide-Moat/open-computer-use)
# security.yml + docs-lint.yml, scoped to the Next.js/TypeScript stack.
#
# Pinning policy (mirrors canon security.yml):
#   - Every `uses:` pinned to a 40-char commit SHA, never a movable tag.
#   - Container images pinned to `name:tag@sha256:<digest>`.
#   - Every actions/checkout sets `persist-credentials: false`.

name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Merge-blocking gates: queue, don't cancel (an intermediate commit left
  # unscanned is the failure mode cancellation would hide).
  cancel-in-progress: false

defaults:
  run:
    working-directory: web

jobs:
  # ── Code quality (the local pre-commit set, now blocking) ──────────────
  quality:
    name: quality — typecheck/lint/format/depcruise/knip/vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run depcruise
      - run: npm run knip
      # Coverage threshold (>=80%) is active now that the auth source exists
      # (CONSTITUTION "Activation rule"); blocking on the auth/BFF scope.
      - run: npm run test:cov

  # ── Mutation testing (auth path; the green suite is not enough) ─────────
  mutation:
    name: mutation — stryker (auth path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # break threshold 60 (stryker.config.mjs); a surviving mutant on the auth
      # path means a vacuous test. Local firsthand score at activation: 89%.
      - run: npm run mutation

  # ── Doc-discipline (tracked markdown only; no TS-code AI-slop gate) ─────
  doc-discipline:
    name: docs — vale + lychee
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # vale (error) on operator-facing top-level docs — these hold the
      # banned-vocab line. The Architecture style is mirrored verbatim from
      # canon (one banlist across the fleet).
      - name: vale (error — operator-facing docs)
        uses: errata-ai/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a # v2.1.2
        with:
          version: 3.15.1
          files: '["README.md", "CONSTITUTION.md", "CONTRIBUTING.md", "SECURITY.md", "CODE_OF_CONDUCT.md"]'
          fail_on_error: true
      # vale (warning) on GSD artifacts — drift is surfaced, not blocked
      # (mirrors canon applying fail_on_error only to its architecture tree).
      - name: vale (warning — GSD artifacts)
        uses: errata-ai/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a # v2.1.2
        with:
          version: 3.15.1
          files: docs/superpowers
          fail_on_error: false
      # lychee — forward-reference (relative-link) integrity on tracked .md.
      # Offline: external URLs are not the guard (rate-limit noise).
      - name: lychee (broken links)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # Use the action's bundled lychee version (its installer only unpacks
          # the flat-layout tarball; v0.24.2 nests the binary and breaks the
          # install step). lychee.toml is written for that bundled version's
          # config schema accordingly.
          args: >-
            --config lychee.toml
            --no-progress
            --offline
            'README.md'
            'CONSTITUTION.md'
            'CONTRIBUTING.md'
            'SECURITY.md'
            'CODE_OF_CONDUCT.md'
            'docs/**/*.md'
          fail: true
          failIfEmpty: false

  # ── Lexicon (naming denylist; fleet-mandatory) ─────────────────────────
  # Mirrors the fleet canon lexicon gate: the project keeps a denylist of terms
  # that must not appear in the tree (working names, third-party naming),
  # maintained as a repository secret so the denied terms are not themselves
  # published. On forks / contexts without the secret the job passes with a
  # notice; it is enforced on this repository's own PRs and pushes. Behavior is
  # mirrored, not bytes — the checkout pin is this repo's own.
  lexicon:
    name: lexicon — naming denylist
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: naming denylist
        env:
          DENYLIST: ${{ secrets.LEXICON_DENYLIST }}
        run: |
          set -euo pipefail
          if [ -z "${DENYLIST:-}" ]; then
            echo "::notice::LEXICON_DENYLIST not configured in this context; skipping"
            exit 0
          fi
          # grep exit codes: 0 = hit (fail the gate), 1 = clean, >=2 = grep
          # itself errored (malformed pattern, read error) — a broken gate
          # must fail loud, never pass as clean.
          rc=0
          hits=$(grep -rniE "$DENYLIST" --exclude-dir='.git' . 2>/tmp/grep-err) || rc=$?
          if [ "$rc" -ge 2 ]; then
            cat /tmp/grep-err >&2
            echo "::error::lexicon grep failed (rc=$rc) — fix the denylist pattern; failing closed"
            exit 1
          fi
          if [ "$rc" -eq 0 ]; then
            # Edit hits down to file:line — the matched term is never echoed,
            # so a denied term cannot leak into the (public) build log.
            echo "$hits" | sed -E 's/^([^:]+:[0-9]+).*/\1: denied term/'
            echo "::error::denied term found — see the project lexicon policy"
            exit 1
          fi
          echo "lexicon clean"

  # ── Secrets scan (fleet-mandatory; critical: auth stores a session secret) ─
  secrets-gitleaks:
    name: secrets — gitleaks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      # Two-source pattern: PR HEAD provides source to scan, the gitleaks
      # CONFIG comes from the BASE ref — never the PR head — so a PR cannot
      # weaken its own scanner config in the same commit (canonical
      # allowlist-bypass attack). Mirrors canon security.yml.
      - name: Checkout PR head (source)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          path: pr-head
      - name: Fetch base-ref .gitleaks.toml via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.base_ref || github.ref_name }}
          REPO: ${{ github.repository }}
        # Always produce config/.gitleaks.toml so `--config` is always passed
        # and gitleaks cannot autoload /repo/.gitleaks.toml (the bypass path).
        # Base ref has the config -> use it. No config on base (this new repo's
        # bootstrap branch) -> use the tree's own. Neither -> useDefault stub.
        run: |
          mkdir -p config
          content="$(gh api "repos/${REPO}/contents/.gitleaks.toml?ref=${BASE_REF}" \
            --jq '.content // empty' 2>/dev/null)" || content=""
          if [ -n "$content" ]; then
            printf '%s' "$content" | tr -d '\n' | base64 -d > config/.gitleaks.toml
            echo "Fetched $(wc -c < config/.gitleaks.toml) bytes of base-ref gitleaks config."
          elif [ -f pr-head/.gitleaks.toml ]; then
            cp pr-head/.gitleaks.toml config/.gitleaks.toml
            echo "No config on base ref ${BASE_REF}; using the tree's own (bootstrap)."
          else
            printf '[extend]\nuseDefault = true\n' > config/.gitleaks.toml
            echo "No .gitleaks.toml on base ref ${BASE_REF} — wrote useDefault stub."
          fi
      - name: Run gitleaks (Docker)
        # The official gitleaks-action requires a paid license for GitHub
        # Organizations. The upstream Docker image is the same detect engine,
        # no license server. Digest-pinned; :ro mounts + --read-only + non-root
        # are defence-in-depth against a compromised image.
        run: |
          docker run --rm \
            --read-only \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/pr-head:/repo:ro" \
            -v "${{ github.workspace }}/config:/config:ro" \
            zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source=/repo --no-banner --redact --exit-code 1 \
            --config=/config/.gitleaks.toml

  secrets-trufflehog:
    name: secrets — trufflehog
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run trufflehog
        uses: trufflesecurity/trufflehog@0ec3634f6cf66a61912a923fee9d20cc45633a67 # main as of 2026-05-24
        with:
          path: ./
          # --no-verification: scan ALL (verified + unverified) without dialing
          # out to providers; most new-code leaks are unverified. --exclude-paths
          # narrows only the dummy-key test fixture (see the exclude file).
          extra_args: --no-verification --exclude-paths=.github/trufflehog-exclude.txt

  # ── SAST (community rules; JS/TS stack) ────────────────────────────────
  sast-semgrep:
    name: SAST — semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.163.0@sha256:7cad2bc2d1e44f87f0bf4be6d1fa23aa90fb72015bebc89fb91385d813987a03
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Semgrep CI (community rules)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMGREP_SUPPRESS_ERRORS: "false"
        run: |
          semgrep ci \
            --config "p/security-audit" \
            --config "p/owasp-top-ten" \
            --config "p/javascript" \
            --config "p/typescript" \
            --config "p/react" \
            --config "p/nextjs" \
            --config "p/github-actions"

  # ── SCA (dependency CVEs) ──────────────────────────────────────────────
  sca-trivy-fs:
    name: SCA — trivy (filesystem)
    runs-on: ubuntu-latest
    # The global token is contents:read only; uploading SARIF to code-scanning
    # needs security-events:write, or the upload silently no-ops and the audit
    # surface goes dark. Scope it to this job, not the whole workflow.
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Trivy filesystem scan (CRITICAL + HIGH, blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: false
          skip-dirs: "web/node_modules,.venv,.planning"
          # Time-bounded exception file: each ignored CVE carries an `exp:`
          # expiry (policy: <= 14 days out) + a tracking reference, so a
          # suppression cannot rot silently — it re-reds the gate on expiry.
          trivyignores: .trivyignore
          format: sarif
          output: trivy-fs.sarif
          limit-severities-for-sarif: true
      - name: Upload SARIF (CRITICAL + HIGH)
        if: always()
        uses: github/codeql-action/upload-sarif@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ── Conventional commits (PR title) ────────────────────────────────────
  conventional-commits:
    name: commits — conventional-commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: .
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            style
            revert
          requireScope: false

# checkov (IaC) is intentionally absent: this repo has no IaC surface
# (no Dockerfile / helm / k8s / terraform) yet. It activates when the admin
# image Dockerfile lands here during ocu-deploy containerization (an
# architect-owned trigger) — tracked as deferred in ROADMAP, not dropped. An
# empty checkov job now would be a fake-green gate (nothing to scan).
